name: Auto-generate WiFiCall rule files

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: python -m pip install pyyaml

      - name: Fetch and merge upstream rule sources
        run: python scripts/fetch-and-merge-upstreams.py

      - name: Generate derived rule files
        run: python scripts/generate-rule-files.py

      - name: Commit and push generated files
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add WifCall-merged.yaml WifCall-clash.yaml WifCall-plain.txt WifCall-loon.txt WifCall-universal.yaml
          if git diff --cached --quiet; then
            echo "No generated changes to commit."
            exit 0
          fi
          git commit -m "chore: regenerate WiFiCall merged and derived rule files"
          git push
